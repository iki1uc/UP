<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UP‑SCAN – Systemlage</title>

<style>
  body { font-family: Arial; background:#111; color:#eee; }
  h1 { text-align:center; }
  .respo-box {
    border:1px solid #444;
    padding:10px;
    margin:10px;
    background:#222;
  }
  .ok { color:#00ff88; }
  .assist { color:#ffcc00; }
  .rot { color:#ff4444; }
</style>
</head>

<body>

<h1>UP‑SCAN – Systemlage</h1>

<div id="output"></div>

<script src="./fin.e.js"></script>

<script>
// ------------------------------------------------------
// RESPO-Liste
// ------------------------------------------------------
const RESPO_NAMES = [
  "AIR","boerse","markt3","HOME","USE","ACSH","REAL","BIL","DU","NG"
];

// ------------------------------------------------------
// Loader
// ------------------------------------------------------
async function loadRespo(name){
  try {
    const res = await fetch(`./RESPO/${name}.json`);
    return await res.json();
  } catch(e){
    return { NAME:name, ROT:true };
  }
}

async function loadAllRespos(){
  const respos = [];
  for(const n of RESPO_NAMES){
    respos.push(await loadRespo(n));
  }
  return respos;
}

// ------------------------------------------------------
// GSF‑ROT Neutralisierung
// ------------------------------------------------------
function GSF_ROT(r){
  return {
    NAME: r.NAME,
    ID: r.ID || null,
    STATUS: r.STATUS || "unknown",
    RESULT: r.RESULT || "none",
    OUT: r.OUT || [],
    REAL: r.WAHRHEIT || "?",
    EDIT: r.IST_IST || "?",
    LEVEL: r.ROT === true ? "ROT" : "OK",
    ASSIST: r.RESULT === "HELFEN"
  };
}

// ------------------------------------------------------
// Renderer
// ------------------------------------------------------
function renderScan(scan){
  const out = document.getElementById("output");
  out.innerHTML = "";

  scan.forEach(r => {
    const box = document.createElement("div");
    box.className = "respo-box";

    let statusClass = "ok";
    if(r.ASSIST) statusClass = "assist";
    if(r.LEVEL === "ROT") statusClass = "rot";

    box.innerHTML = `
      <h2 class="${statusClass}">${r.NAME}</h2>
      <p><b>ID:</b> ${r.ID}</p>
      <p><b>LAGE:</b> ${r.RAUM ? JSON.stringify(r.RAUM) : "(keine LAGE)"}</p>
      <p><b>STATUS:</b> ${r.STATUS}</p>
      <p><b>RESULT:</b> ${r.RESULT}</p>
      <p><b>OUT:</b> ${JSON.stringify(r.OUT)}</p>
      <p><b>REAL:</b> ${r.REAL}</p>
      <p><b>EDIT:</b> ${r.EDIT}</p>
      <p><b>LEVEL:</b> ${r.LEVEL}</p>
    `;

    out.appendChild(box);
  });
}

// ------------------------------------------------------
// Start
// ------------------------------------------------------
loadAllRespos().then(respos => {
  const scan = respos.map(r => GSF_ROT(r));
  renderScan(scan);
});
</script>

</body>
</html>
