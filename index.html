<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IN · RESPO Station</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
</style>
</head>

<body>

<h1>IN · RESPO Station</h1>

<pre id="in_out">
CORE        = IN
VERSION     = 1.2
STATE       = rdy
LEVEL       = rot
READY       = 100%
</pre>

<script>
// --- IN empfängt Daten ---
async function IN_RECEIVE(event){
    const scan = JSON.parse(event);
    IN_PROCESS(scan);
}

// --- IN verarbeitet Daten ---
function IN_PROCESS(scan){
    const out = document.getElementById("in_out");

    out.innerHTML += "\nROT   = " + JSON.stringify(scan.rot);
    out.innerHTML += "\nGELB  = " + JSON.stringify(scan.gelb);
    out.innerHTML += "\nGRUEN = " + JSON.stringify(scan.gruen);

    if(scan.rot) IN_ROUTE("rot", scan.rot);
    if(scan.gelb) IN_ROUTE("gelb", scan.gelb);
    if(scan.gruen) IN_ROUTE("gruen", scan.gruen);
}

// --- IN Routing ---
function IN_ROUTE(level, list){
    if(level === "rot"){
        console.log("IN → OUT:", list);
    } else if(level === "gelb"){
        console.log("IN → IX:", list);
    } else {
        console.log("IN → UP:", list);
    }
}
</script>

</body>
</html>
