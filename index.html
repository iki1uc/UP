<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UP · Basismodul</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1, h2 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
a { color:#6cf; display:block; margin:10px 0; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
</style>
</head>

<body>

<h1>UP · Basismodul</h1>

<pre id="up_out">
CORE        = UP
VERSION     = 2.0
STATE       = rdy
LEVEL       = gruen
READY       = 100%
</pre>

<h2>Stationen</h2>
<div class="grid">
  <a href="../IN/index.html">IN · RESPO</a>
  <a href="../IX/index.html">IX · Station</a>
  <a href="../XI/index.html">XI · Station</a>
  <a href="./scan.mode">SCAN · Mode</a>
  <a href="./verify.html">VERIFY</a>
  <a href="./time_3x11_scroll_zoom.html">TIME · 3x11</a>
</div>

<script>
// --- UP erkennt neue Ordner ---
const UP_FOLDERS = [
    "../IN/",
    "../IX/",
    "../XI/"
];

// --- UP-SCAN (nur eigene Dateien) ---
const UP_FILES = [
    "index.html",
    "scan.mode",
    "verify.html",
    "time_3x11_scroll_zoom.html"
];

async function UP_SCAN(){
    const out = { rot:[], gelb:[], gruen:[] };

    for(const f of UP_FILES){
        try {
            const res = await fetch(`./${f}`);
            if(!res.ok){
                out.rot.push(f);
                continue;
            }

            const txt = await res.text();
            if(txt.trim().length === 0){
                out.gelb.push(f);
            } else {
                out.gruen.push(f);
            }

        } catch(e){
            out.rot.push(f);
        }
    }

    return out;
}

// --- UP empfängt ENTER von CR ---
window.addEventListener("message", (event) => {
    if(event.data.FROM === "CR" && event.data.TYPE === "ENTER"){
        document.getElementById("up_out").innerHTML += "\nENTER von CR";
        document.body.style.border = "2px solid #6cf";
    }
});

// --- START ---
(async () => {
    const scan = await UP_SCAN();
    const out = document.getElementById("up_out");

    out.innerHTML += "\nROT   = " + JSON.stringify(scan.rot);
    out.innerHTML += "\nGELB  = " + JSON.stringify(scan.gelb);
    out.innerHTML += "\nGRUEN = " + JSON.stringify(scan.gruen);

    // Ordner anzeigen
    out.innerHTML += "\nFOLDER = " + JSON.stringify(UP_FOLDERS);
})();
</script>

</body>
</html>
