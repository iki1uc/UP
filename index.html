<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UP · Vorderstation</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

#portal {
    width: 360px;
    height: 360px;
    margin: auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 10s linear infinite;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #6cf;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
</style>

<script src="UP.core.js"></script>
<script src="UP.scan.js"></script>
<script src="UP.mode.js"></script>
<script src="UP.pipeline.js"></script>

</head>

<body>

<h1>UP · Vorderstation</h1>

<div id="portal"></div>
<pre id="status">Lade UP…</pre>

<script>
const portal = document.getElementById("portal");
const count = 36;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 180 - 5;
    const y = Math.sin(angle) * radius + 180 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    portal.appendChild(dot);
}

UP.enter(77);
UP.scan = UP_SCAN.detect(UP.input);
UP.mode = UP_MODE.set("CORE");
const result = UP.compute();
const forward = UP_PIPE.fuse(result);

document.getElementById("status").innerText =
    JSON.stringify({ UP: result, forward }, null, 2);
</script>

</body>
</html>
