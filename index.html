<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UP · Pipeline 3–6</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1, h2 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
a { color:#6cf; display:block; margin:10px 0; }
.respo-box { border:1px solid #333; padding:10px; margin:10px; background:#111; }

.rot { color:#ff4444; }
.gelb { color:#ffcc00; }
.gruen { color:#00ff88; }
.route { color:#6cf; }
</style>
</head>

<body>

<h1>UP · Pipeline 3–6</h1>

<pre id="grml_out">
CORE        = UP
VERSION     = 2.1
STATE       = rdy
LEVEL       = rot
READY       = 100%

PIPELINE    = IN / IX / GRML / VERIFY / UI
</pre>

<div id="output"></div>

<script src="./scan.mode"></script>
<script src="./grml.mode"></script>

<script>
// RESPO-Liste
const RESPO_NAMES = ["AIR","boerse","markt3","HOME","USE","ACSH","REAL","BIL","DU","NG"];

// Loader
async function loadRespo(name){
  try {
    const res = await fetch(`./RESPO/${name}.json`);
    return await res.json();
  } catch(e){
    return { NAME:name, MISS:true };
  }
}

// SCAN-Modul
function UP_SCAN(r){
  const level = r.ERROR || r.MISS ? "rot" : r.RESULT === "HELFEN" ? "gelb" : "gruen";

  return {
    NAME: r.NAME,
    STATUS: r.STATUS || "unknown",
    LEVEL: level,
    ASSIST: r.RESULT === "HELFEN",
    OUT: r.OUT || [],
    REAL: r.WAHRHEIT || "?",
    EDIT: r.IST_IST || "?"
  };
}

// Routing
function UP_ROUTE(r){
  if(r.LEVEL === "rot") return "OUT";
  if(r.LEVEL === "gelb") return "IN";
  return "IX";
}

// Pipeline 3 — UP → IN
function UP_TO_IN(scan){
  console.log("UP → IN:", scan);
}

// Pipeline 4 — UP → IX
function UP_TO_IX(scan){
  console.log("UP → IX:", scan);
}

// Renderer
function renderScan(scan){
  const out = document.getElementById("output");
  out.innerHTML = "";

  scan.forEach(r => {
    const box = document.createElement("div");
    box.className = "respo-box";

    box.innerHTML = `
      <h2 class="${r.LEVEL}">${r.NAME}</h2>
      <p><b>STATUS:</b> ${r.STATUS}</p>
      <p><b>LEVEL:</b> ${r.LEVEL}</p>
      <p><b>ASSIST:</b> ${r.ASSIST}</p>
      <p><b>OUT:</b> ${JSON.stringify(r.OUT)}</p>
      <p><b>REAL:</b> ${r.REAL}</p>
      <p><b>EDIT:</b> ${r.EDIT}</p>
      <p class="route"><b>ROUTE:</b> ${UP_ROUTE(r)}</p>
    `;

    out.appendChild(box);

    // Pipeline routing
    if(UP_ROUTE(r) === "IN") UP_TO_IN(r);
    if(UP_ROUTE(r) === "IX") UP_TO_IX(r);
  });
}

// GRML Fullscan
async function GRML_UP_SCAN(){
  const files = [
    "index.html",
    "scan.mode",
    "verify.html",
    "time_3x11_scroll_zoom.html",
    "L",
    "t",
    "T"
  ];

  const out = { ok:[], miss:[], warn:[] };

  for(const f of files){
    try {
      const res = await fetch(`./${f}`);
      if(!res.ok) out.miss.push(f);
      else {
        const txt = await res.text();
        if(txt.trim().length === 0) out.warn.push(f);
        else out.ok.push(f);
      }
    } catch(e){
      out.miss.push(f);
    }
  }

  return out;
}

// Start
(async () => {
  const respos = [];
  for(const n of RESPO_NAMES){
    respos.push(await loadRespo(n));
  }

  const scan = respos.map(r => UP_SCAN(r));
  renderScan(scan);

  const grml = await GRML_UP_SCAN();
  const out = document.getElementById("grml_out");

  out.innerHTML += "\nGRML.OK      = " + JSON.stringify(grml.ok);
  out.innerHTML += "\nGRML.WARN    = " + JSON.stringify(grml.warn);
  out.innerHTML += "\nGRML.MISS    = " + JSON.stringify(grml.miss);
})();
</script>

</body>
</html>
