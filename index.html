<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UP · Portal</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1, h2 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
a { color:#6cf; display:block; margin:10px 0; }
.respo-box { border:1px solid #333; padding:10px; margin:10px; background:#111; }
.ok { color:#00ff88; }
.assist { color:#ffcc00; }
.rot { color:#ff4444; }
</style>
</head>

<body>

<h1>UP · RESPO-SCAN</h1>

<pre>
CORE    = UP
MODE    = SCAN-HUB
LEVEL   = rot
STATE   = rdy
READY   = 100%
</pre>

<div id="output"></div>

<script>
// RESPO-Liste
const RESPO_NAMES = ["AIR","boerse","markt3","HOME","USE","ACSH","REAL","BIL","DU","NG"];

// Loader
async function loadRespo(name){
  try {
    const res = await fetch(`./RESPO/${name}.json`);
    return await res.json();
  } catch(e){
    return { NAME:name, MISS:true };
  }
}

// SCAN-Modul
function UP_SCAN(r){
  return {
    NAME: r.NAME,
    STATUS: r.STATUS || "unknown",
    LEVEL: r.ERROR || r.MISS ? "rot" : "ok",
    ASSIST: r.RESULT === "HELFEN",
    OUT: r.OUT || [],
    REAL: r.WAHRHEIT || "?",
    EDIT: r.IST_IST || "?"
  };
}

// MAP-Modul
const RESPO_MAP = {
  AIR: "Input",
  boerse: "Value",
  markt3: "Trade",
  HOME: "Local",
  USE: "User",
  ACSH: "Cash",
  REAL: "Real",
  BIL: "Image",
  DU: "Person",
  NG: "Next"
};

// Routing
function UP_ROUTE(r){
  if(r.LEVEL === "rot") return "OUT";
  if(r.ASSIST) return "IO";
  return "SCAN-HUB";
}

// Renderer
function renderScan(scan){
  const out = document.getElementById("output");
  out.innerHTML = "";

  scan.forEach(r => {
    const box = document.createElement("div");
    box.className = "respo-box";

    let statusClass = r.LEVEL === "rot" ? "rot" : r.ASSIST ? "assist" : "ok";

    box.innerHTML = `
      <h2 class="${statusClass}">${r.NAME}</h2>
      <p><b>MAP:</b> ${RESPO_MAP[r.NAME]}</p>
      <p><b>STATUS:</b> ${r.STATUS}</p>
      <p><b>LEVEL:</b> ${r.LEVEL}</p>
      <p><b>ASSIST:</b> ${r.ASSIST}</p>
      <p><b>OUT:</b> ${JSON.stringify(r.OUT)}</p>
      <p><b>REAL:</b> ${r.REAL}</p>
      <p><b>EDIT:</b> ${r.EDIT}</p>
      <p><b>ROUTE:</b> ${UP_ROUTE(r)}</p>
    `;

    out.appendChild(box);
  });
}

// Start
(async () => {
  const respos = [];
  for(const n of RESPO_NAMES){
    respos.push(await loadRespo(n));
  }
  const scan = respos.map(r => UP_SCAN(r));
  renderScan(scan);
})();
</script>

</body>
</html>
