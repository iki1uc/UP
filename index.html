<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>UP · Basismodul</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1, h2 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
a { color:#6cf; display:block; margin:6px 0; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
</style>
</head>

<body>

<h1>UP · Basismodul</h1>

<pre id="station_out">
CORE        = UP
VERSION     = 3.1
STATE       = rdy
LEVEL       = gruen
READY       = 100%
</pre>

<h2>Stationen</h2>
<div class="grid">
  <a href="../IN/index.html">IN</a>
  <a href="../IX/index.html">IX</a>
  <a href="../XI/index.html">XI</a>
  <a href="./scan.mode">SCAN</a>
  <a href="./verify.html">VERIFY</a>
  <a href="./time_3x11_scroll_zoom.html">TIME</a>
</div>

<script>
// --- Listener für eingehende Nachrichten ---
window.addEventListener("message", (event) => {
    const d = event.data;
    if(!d || !d.FROM || !d.TO) return;

    document.body.style.border = "2px solid #6cf";
    document.getElementById("station_out").innerHTML += `\nFROM: ${d.FROM} → TO: ${d.TO}`;
});

// --- UP-SCAN ---
const UP_FILES = ["index.html","scan.mode","verify.html","time_3x11_scroll_zoom.html"];

async function UP_SCAN(){
    const out = { rot:[], gelb:[], gruen:[] };

    for(const f of UP_FILES){
        try {
            const res = await fetch(`./${f}`);
            if(!res.ok){ out.rot.push(f); continue; }

            const txt = await res.text();
            if(txt.trim().length === 0) out.gelb.push(f);
            else out.gruen.push(f);

        } catch(e){ out.rot.push(f); }
    }
    return out;
}

// --- UP → ALLE ROUTING ---
function UP_ROUTE(scan){
    const payload = { FROM:"UP", DATA:scan, TIME:Date.now() };

    window.postMessage({...payload, TO:"IN"}, "*");
    window.postMessage({...payload, TO:"IX"}, "*");
    window.postMessage({...payload, TO:"XI"}, "*");
    window.postMessage({...payload, TO:"XROOM"}, "*");
    window.postMessage({...payload, TO:"OUT"}, "*");
}

// --- START ---
(async () => {
    const scan = await UP_SCAN();
    const out = document.getElementById("station_out");

    out.innerHTML += "\nROT   = " + JSON.stringify(scan.rot);
    out.innerHTML += "\nGELB  = " + JSON.stringify(scan.gelb);
    out.innerHTML += "\nGRUEN = " + JSON.stringify(scan.gruen);

    UP_ROUTE(scan);
})();
</script>

</body>
</html>
